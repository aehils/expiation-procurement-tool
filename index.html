<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worldwide Healthcare Procurement</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #1a1a2e;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 4rem 2rem;
      text-align: center;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 100%);
    }

    .hero h1 {
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    .hero p {
      font-size: 1.25rem;
      color: #555;
      max-width: 600px;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2.25rem;
      }

      .hero p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Worldwide<br>Healthcare Procurement</h1>
    <p>and healthcare providers across the globe.</p>
  </section>
</body>
</html>
