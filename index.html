<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediProcure • RFQ Item Entry</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --tw-color-primary: #0f766e;
        }

        .form-input {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.2);
            border-color: #0f766e;
        }

        .table-row {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-gradient {
            background: linear-gradient(90deg, #0f766e, #134e4a);
        }

        /* Hide number input steppers */
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div id="root" class="min-h-screen"></div>

    <script type="text/babel">
        const { useState, useEffect } = React

        function App() {
            // Form state
            const [formData, setFormData] = React.useState({
                item_category: '',
                department: '',
                item_name: '',
                item_description: '',
                request_quantity: '',
                size: '',
                specification: '',
                brand: '',
                model: '',
                additional_notes: ''
            })

            // List of added items
            const [items, setItems] = React.useState([])

            // Categories and Departments (realistic for medical procurement)
            const categories = [
                { value: 'surgical-instruments', label: 'Surgical Instruments' },
                { value: 'consumables', label: 'Consumables' },
                { value: 'diagnostic-equipment', label: 'Diagnostic Equipment' },
                { value: 'laboratory-supplies', label: 'Laboratory Supplies' },
                { value: 'patient-care', label: 'Patient Care Items' },
                { value: 'imaging-radiology', label: 'Imaging & Radiology' },
                { value: 'monitoring-devices', label: 'Monitoring Devices' },
                { value: 'pharmaceuticals', label: 'Pharmaceuticals' },
                { value: 'implants-prosthetics', label: 'Implants & Prosthetics' },
                { value: 'sterilization', label: 'Sterilization & Disinfection' },
                { value: 'other', label: 'Other' }
            ]

            const departments = [
                { value: 'operating-room', label: 'Operating Room' },
                { value: 'icu', label: 'ICU / Critical Care' },
                { value: 'emergency', label: 'Emergency Department' },
                { value: 'laboratory', label: 'Laboratory' },
                { value: 'radiology', label: 'Radiology' },
                { value: 'pharmacy', label: 'Pharmacy' },
                { value: 'cardiology', label: 'Cardiology' },
                { value: 'pediatrics', label: 'Pediatrics' },
                { value: 'general-ward', label: 'General Ward' },
                { value: 'dialysis', label: 'Dialysis Unit' },
                { value: 'other', label: 'Other' }
            ]

            // Handle input changes
            const handleChange = (e) => {
                const { name, value } = e.target
                setFormData(prev => ({
                    ...prev,
                    [name]: value
                }))
            }

            // Add item to list
            const handleAddItem = (e) => {
                e.preventDefault()

                // Basic validation
                if (!formData.item_name || !formData.item_category || !formData.department || !formData.request_quantity) {
                    alert("Please fill in at least: Item Name, Category, Department, and Quantity.")
                    return
                }

                const newItem = {
                    id: Date.now(),
                    ...formData,
                    request_quantity: parseFloat(formData.request_quantity) || 0
                }

                setItems(prev => [...prev, newItem])

                // Reset form
                setFormData({
                    item_category: '',
                    department: '',
                    item_name: '',
                    item_description: '',
                    request_quantity: '',
                    size: '',
                    specification: '',
                    brand: '',
                    model: '',
                    additional_notes: ''
                })

                // Show success feedback
                const toast = document.createElement('div')
                toast.className = 'fixed bottom-6 right-6 bg-teal-700 text-white px-6 py-3 rounded shadow-xl flex items-center gap-2'
                toast.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7" />
                    </svg>
                    Item added successfully!
                `
                document.body.appendChild(toast)
                setTimeout(() => toast.remove(), 2500)
            }

            // Delete item
            const handleDelete = (id) => {
                if (confirm('Delete this item from the RFQ?')) {
                    setItems(prev => prev.filter(item => item.id !== id))
                }
            }

            // Clear all items
            const clearAllItems = () => {
                if (items.length === 0) return
                if (confirm('Clear ALL items from this RFQ? This cannot be undone.')) {
                    setItems([])
                }
            }

            // Export RFQ as JSON (for now - easy to connect to backend later)
            const exportRFQ = () => {
                if (items.length === 0) {
                    alert("No items to export yet!")
                    return
                }

                const rfqData = {
                    rfq_id: "RFQ-" + new Date().toISOString().slice(0,10).replace(/-/g, ''),
                    created_at: new Date().toISOString(),
                    total_items: items.length,
                    items: items
                }

                const dataStr = JSON.stringify(rfqData, null, 2)
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr)

                const exportFileDefaultName = `RFQ_${new Date().toISOString().slice(0,10)}.json`

                const linkElement = document.createElement('a')
                linkElement.setAttribute('href', dataUri)
                linkElement.setAttribute('download', exportFileDefaultName)
                linkElement.click()

                alert(`RFQ exported as ${exportFileDefaultName}\n\n(Ready for your parser or backend integration)`)
            }

            return React.createElement('div', { className: "max-w-7xl mx-auto" },
                // Header removed - no auth/branding at this stage

                React.createElement('div', { className: "px-8 py-8" },
                    React.createElement('div', { className: "flex justify-between items-start mb-8" },
                        React.createElement('div', null,
                            React.createElement('h2', {
                                className: "text-4xl font-semibold text-slate-800 tracking-tight"
                            }, "New Request for Quote"),
                            React.createElement('p', {
                                className: "text-slate-600 mt-1"
                            }, "#RF000384721")
                        ),
                        React.createElement('div', { className: "flex gap-3" },
                            items.length > 0 && React.createElement('button', {
                                onClick: exportRFQ,
                                className: "px-6 py-3 bg-teal-700 hover:bg-teal-800 text-white rounded font-medium flex items-center gap-2 shadow-sm"
                            },
                                React.createElement('span', null, "\uD83D\uDCBE"),
                                React.createElement('span', null, "Export RFQ JSON")
                            ),
                            React.createElement('button', {
                                onClick: clearAllItems,
                                className: "px-6 py-3 bg-red-600 hover:bg-red-700 text-red-50 rounded font-medium"
                            },
                                "Delete"
                            )
                        )
                    ),

                    // Main content grid
                    React.createElement('div', { className: "grid grid-cols-1 lg:grid-cols-12 gap-8" },

                        // Form
                        React.createElement('div', { className: "lg:col-span-7 bg-white rounded-md shadow-xl p-8 border border-slate-100" },
                            React.createElement('form', { onSubmit: handleAddItem, className: "space-y-8" },

                                // Row 1: Category, Department, Quantity
                                React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-3 gap-6" },
                                    React.createElement('div', null,
                                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Item Category *"),
                                        React.createElement('select', {
                                            name: "item_category",
                                            value: formData.item_category,
                                            onChange: handleChange,
                                            required: true,
                                            className: "form-input w-full px-4 py-4 border border-slate-300 rounded focus:outline-none text-slate-800"
                                        },
                                            React.createElement('option', { value: "" }, "Select"),
                                            categories.map(cat =>
                                                React.createElement('option', {
                                                    key: cat.value,
                                                    value: cat.value
                                                }, cat.label)
                                            )
                                        )
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Department *"),
                                        React.createElement('select', {
                                            name: "department",
                                            value: formData.department,
                                            onChange: handleChange,
                                            required: true,
                                            className: "form-input w-full px-4 py-4 border border-slate-300 rounded focus:outline-none text-slate-800"
                                        },
                                            React.createElement('option', { value: "" }, "Select"),
                                            departments.map(dep =>
                                                React.createElement('option', {
                                                    key: dep.value,
                                                    value: dep.value
                                                }, dep.label)
                                            )
                                        )
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Request Quantity *"),
                                        React.createElement('input', {
                                            type: "number",
                                            name: "request_quantity",
                                            value: formData.request_quantity,
                                            onChange: handleChange,
                                            required: true,
                                            min: "1",
                                            className: "form-input w-full px-4 py-4 border border-slate-300 rounded focus:outline-none text-slate-800"
                                        })
                                    )
                                ),

                                // Row 2: Item Name (full width)
                                React.createElement('div', null,
                                    React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Item Name *"),
                                    React.createElement('input', {
                                        type: "text",
                                        name: "item_name",
                                        value: formData.item_name,
                                        onChange: handleChange,
                                        required: true,
                                        placeholder: "",
                                        className: "form-input w-full px-4 py-4 border border-slate-300 rounded focus:outline-none text-slate-800"
                                    })
                                ),

                                // Row 3: Brand, Model, Size
                                React.createElement('div', { className: "grid grid-cols-1 md:grid-cols-3 gap-6" },
                                    React.createElement('div', null,
                                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Brand"),
                                        React.createElement('input', {
                                            type: "text",
                                            name: "brand",
                                            value: formData.brand,
                                            onChange: handleChange,
                                            placeholder: "",
                                            className: "form-input w-full px-4 py-4 border border-slate-300 rounded focus:outline-none text-slate-800"
                                        })
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Model"),
                                        React.createElement('input', {
                                            type: "text",
                                            name: "model",
                                            value: formData.model,
                                            onChange: handleChange,
                                            placeholder: "",
                                            className: "form-input w-full px-4 py-4 border border-slate-300 rounded focus:outline-none text-slate-800"
                                        })
                                    ),
                                    React.createElement('div', null,
                                        React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Size"),
                                        React.createElement('input', {
                                            type: "text",
                                            name: "size",
                                            value: formData.size,
                                            onChange: handleChange,
                                            placeholder: "",
                                            className: "form-input w-full px-4 py-4 border border-slate-300 rounded focus:outline-none text-slate-800"
                                        })
                                    )
                                ),

                                // Specification (larger textarea)
                                React.createElement('div', null,
                                    React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Specification"),
                                    React.createElement('textarea', {
                                        name: "specification",
                                        value: formData.specification,
                                        onChange: handleChange,
                                        rows: 3,
                                        placeholder: "",
                                        className: "form-input w-full px-4 py-4 border border-slate-300 rounded-md focus:outline-none text-slate-800 resize-none"
                                    })
                                ),

                                // Item Description
                                React.createElement('div', null,
                                    React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Item Description"),
                                    React.createElement('textarea', {
                                        name: "item_description",
                                        value: formData.item_description,
                                        onChange: handleChange,
                                        rows: 3,
                                        placeholder: "",
                                        className: "form-input w-full px-4 py-4 border border-slate-300 rounded-md focus:outline-none text-slate-800 resize-none"
                                    })
                                ),

                                // Additional Notes
                                React.createElement('div', null,
                                    React.createElement('label', { className: "block text-sm font-medium text-slate-700 mb-2" }, "Additional Notes"),
                                    React.createElement('textarea', {
                                        name: "additional_notes",
                                        value: formData.additional_notes,
                                        onChange: handleChange,
                                        rows: 2,
                                        placeholder: "",
                                        className: "form-input w-full px-4 py-4 border border-slate-300 rounded-md focus:outline-none text-slate-800 resize-none"
                                    })
                                ),

                                // Submit buttons
                                React.createElement('div', { className: "flex gap-4 pt-4" },
                                    React.createElement('button', {
                                        type: "submit",
                                        style: { backgroundColor: "#276e79" },
                                        className: "flex-1 hover:opacity-90 text-white font-semibold py-5 rounded-md text-lg flex items-center justify-center shadow-sm"
                                    },
                                        "Submit"
                                    ),
                                    React.createElement('button', {
                                        type: "button",
                                        onClick: () => {
                                            setFormData({
                                                item_category: '', department: '', item_name: '', item_description: '',
                                                request_quantity: '', size: '', specification: '', brand: '',
                                                model: '', additional_notes: ''
                                            })
                                        },
                                        className: "px-10 border-2 border-slate-300 hover:bg-slate-100 font-medium rounded-md"
                                    }, "Clear Form")
                                )
                            )
                        ),

                        // Live Preview / Added Items
                        React.createElement('div', { className: "lg:col-span-5" },
                            React.createElement('div', { className: "bg-white rounded-md shadow-xl border border-slate-100 h-full flex flex-col" },
                                React.createElement('div', { className: "px-8 pt-8 pb-4 flex items-center justify-between" },
                                    React.createElement('h3', { className: "font-semibold text-xl text-slate-800" }, "Added"),
                                    React.createElement('span', { className: "text-sm text-slate-400" }, `${items.length} Items`)
                                ),

                                // Items list
                                React.createElement('div', { className: "flex-1 p-8 overflow-auto" },
                                    items.length === 0
                                    ? React.createElement('div', {
                                        className: "h-full flex flex-col items-center justify-center text-center text-slate-400"
                                      },
                                        React.createElement('p', { className: "text-xl font-medium" }, "No items added yet"),
                                        React.createElement('p', { className: "mt-2" }, "Add Item to RFQ")
                                      )
                                    : React.createElement('div', { className: "space-y-4" },
                                        items.map(item =>
                                            React.createElement('div', {
                                                key: item.id,
                                                className: "bg-slate-50 border border-slate-200 rounded p-5 table-row hover:shadow-md"
                                            },
                                                React.createElement('div', { className: "flex justify-between items-start" },
                                                    React.createElement('div', null,
                                                        React.createElement('div', { className: "flex items-center gap-3" },
                                                            React.createElement('div', { className: "font-semibold text-lg" }, item.item_name),
                                                            React.createElement('span', {
                                                                className: "px-3 py-px text-xs font-medium bg-teal-100 text-teal-700 rounded"
                                                            }, item.item_category.replace('-', ' ').toUpperCase())
                                                        ),
                                                        React.createElement('p', { className: "text-slate-500 text-sm mt-1" },
                                                            `${item.department.replace('-', ' ')} \u2022 Qty: ${item.request_quantity} ${item.size ? `\u2022 ${item.size}` : ''}`
                                                        ),
                                                        item.brand && React.createElement('p', { className: "text-sm text-slate-600 mt-2" },
                                                            `${item.brand} ${item.model ? `\u2022 Model ${item.model}` : ''}`
                                                        )
                                                    ),
                                                    React.createElement('button', {
                                                        onClick: () => handleDelete(item.id),
                                                        className: "text-red-400 hover:text-red-600 text-xl leading-none"
                                                    }, "\u00D7")
                                                ),
                                                item.item_description && React.createElement('p', {
                                                    className: "text-slate-600 text-sm mt-3 line-clamp-2"
                                                }, item.item_description),
                                                item.additional_notes && React.createElement('div', {
                                                    className: "mt-4 text-xs bg-white px-3 py-2 rounded border border-slate-100 text-slate-500 italic"
                                                }, item.additional_notes)
                                            )
                                        )
                                    )
                                ),

                                // Proceed button
                                items.length > 0 && React.createElement('div', { className: "px-8 pb-8 pt-4" },
                                    React.createElement('button', {
                                        style: { backgroundColor: "#274579" },
                                        className: "w-full hover:opacity-90 text-white font-semibold py-5 rounded-md text-lg shadow-sm"
                                    }, "Proceed")
                                )
                            )
                        )
                    )
                )
            )
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'))
        root.render(
            React.createElement(
                React.StrictMode,
                null,
                React.createElement(App)
            )
        )
    </script>
</body>
</html>
